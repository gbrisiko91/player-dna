<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayerDNA | Neural Analysis Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/framer-motion@11.2.10/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --dna-purple: #8b5cf6;
            --dna-neon: #00f2ff;
            --dna-toxic: #adff2f;
            --dna-black: #050505;
        }
        body {
            background-color: var(--dna-black);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .font-esports { font-family: 'Orbitron', sans-serif; }
        .cyber-grid {
            background-size: 30px 30px;
            background-image: radial-gradient(circle at 1px 1px, rgba(139, 92, 246, 0.1) 1px, transparent 0);
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .text-glow {
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.5), 0 0 20px rgba(139, 92, 246, 0.3);
        }
        .skew-btn {
            transform: skewX(-12deg);
        }
        .skew-content {
            transform: skewX(12deg);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .loader-ring {
            border-top-color: transparent;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="cyber-grid min-h-screen">

    <!-- NAVIGATION -->
    <nav class="fixed top-0 w-full z-50 border-b border-white/5 bg-black/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i data-lucide="dna" class="text-dna-purple w-8 h-8"></i>
                <span class="font-esports font-black italic text-xl">PLAYER<span class="text-dna-neon">DNA</span></span>
            </div>
            <button class="font-esports text-[10px] tracking-widest uppercase text-gray-400 hover:text-white transition-colors">Discord Login</button>
        </div>
    </nav>

    <!-- MAIN CONTAINER -->
    <main id="app" class="relative z-10 pt-20">
        
        <!-- HOME SECTION -->
        <section id="home-view" class="min-h-[90vh] flex flex-col items-center justify-center px-4 text-center">
            <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-dna-purple/10 blur-[100px] animate-float"></div>
            <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-dna-blue/10 blur-[100px] animate-float" style="animation-delay: -3s"></div>

            <h2 class="text-dna-neon font-esports text-sm tracking-[0.5em] mb-4 uppercase">Neural Analysis System v1.0</h2>
            <h1 class="text-5xl md:text-8xl font-esports italic font-black mb-6 tracking-tighter">
                SCOPRI IL TUO VERO <br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-cyan-400 text-glow">PLAYER DNA</span>
            </h1>
            <p class="text-xl text-gray-400 font-light mb-12 max-w-2xl mx-auto">Non analizziamo il tuo rank. <br><span class="text-white font-medium">Analizziamo la tua mente in game.</span></p>
            
            <button onclick="router.go('quiz')" class="skew-btn bg-dna-purple px-12 py-5 font-esports tracking-widest hover:shadow-[0_0_30px_rgba(139,92,246,0.5)] transition-all">
                <span class="skew-content inline-block">AVVIA ANALISI</span>
            </button>
        </section>

        <!-- QUIZ SECTION (Hidden by default) -->
        <section id="quiz-view" class="hidden min-h-[90vh] flex flex-col items-center justify-center px-4 max-w-2xl mx-auto">
            <div class="w-full mb-12">
                <div class="flex justify-between font-esports text-[10px] text-gray-500 mb-4 tracking-widest uppercase">
                    <span id="quiz-progress-text">Analisi 1 / 6</span>
                    <span>Mappatura Sinaptica...</span>
                </div>
                <div class="h-1 bg-white/5 w-full rounded-full">
                    <div id="quiz-progress-bar" class="h-full bg-dna-purple transition-all duration-500" style="width: 16%"></div>
                </div>
            </div>
            <h3 id="question-text" class="text-3xl md:text-4xl font-esports italic mb-12 uppercase text-glow leading-tight">Caricamento...</h3>
            <div id="options-container" class="w-full space-y-4"></div>
        </section>

        <!-- LOADING SECTION (Hidden by default) -->
        <section id="loading-view" class="hidden min-h-[90vh] flex flex-col items-center justify-center px-4 text-center">
            <div class="w-24 h-24 border-4 border-dna-purple border-t-transparent rounded-full animate-spin mb-12"></div>
            <h2 class="text-2xl font-esports italic text-dna-neon animate-pulse tracking-widest">SEQUENZIAMENTO DNA IN CORSO...</h2>
        </section>

        <!-- RESULT SECTION (Hidden by default) -->
        <section id="result-view" class="hidden min-h-[90vh] flex flex-col items-center justify-center px-4 py-20">
            <div id="result-card-container" class="mb-12"></div>
            <div class="flex flex-col md:flex-row gap-6">
                <button onclick="location.reload()" class="skew-btn bg-dna-purple px-10 py-4 font-esports text-sm tracking-widest uppercase">
                    <span class="skew-content inline-block">RIFAI TEST</span>
                </button>
                <button onclick="alert('Link copiato!')" class="skew-btn border border-white/20 px-10 py-4 font-esports text-sm tracking-widest uppercase">
                    <span class="skew-content inline-block">CONDIVIDI</span>
                </button>
            </div>
        </section>

    </main>

    <script>
        // ARCHETYPES & QUESTIONS
        const ARCHETYPES = [
            { name: "Clutch Demon", slug: "clutch-demon", color: "#00f2ff", rarity: 3, quote: "Il 1v5 non è un problema. È un'opportunità.", traits: { ego: 65, clutch: 98, toxic: 20, tactics: 70, resilience: 95 } },
            { name: "Tilt Berserker", slug: "tilt-berserker", color: "#ff4b2b", rarity: 15, quote: "Se andiamo a fondo, porto l'intero server con me.", traits: { ego: 80, clutch: 40, toxic: 85, tactics: 30, resilience: 10 } },
            { name: "Silent Killer", slug: "silent-killer", color: "#ffffff", rarity: 5, quote: "Le azioni parlano. Io no.", traits: { ego: 40, clutch: 85, toxic: 5, tactics: 80, resilience: 90 } },
            { name: "Zen Master", slug: "zen-master", color: "#f6d365", rarity: 2, quote: "È solo un gioco. Ma vincere è un'abitudine.", traits: { ego: 20, clutch: 80, toxic: 0, tactics: 85, resilience: 99 } }
        ];

        const QUESTIONS = [
            { text: "Il tuo team sta perdendo 12-0. Cosa scrivi in chat?", options: [{ text: "/ff next please", w: { resilience: -20, toxic: 10 } }, { text: "Mute all e provo l'ace", w: { ego: 20, clutch: 10 } }, { text: "Cosa possiamo cambiare?", w: { tactics: 20, resilience: 10 } }] },
            { text: "Sei in un 1v3 decisivo. Cosa senti?", options: [{ text: "Il cuore a mille, sono pronto", w: { clutch: 20 } }, { text: "Nervosismo, probabilmente sbaglierò", w: { clutch: -20 } }, { text: "Lo faccio solo per la clip", w: { ego: 30 } }] },
            { text: "Un nemico ti provoca pesantemente. Come reagisci?", options: [{ text: "Lo ignoro e lo distruggo", w: { resilience: 20, tactics: 10 } }, { text: "Reagisco verbalmente", w: { toxic: 30 } }, { text: "Rido, è divertente", w: { resilience: 15 } }] }
        ];

        // ENGINE
        let currentIdx = 0;
        let scores = { ego: 50, clutch: 50, toxic: 50, tactics: 50, resilience: 50 };

        const router = {
            go(viewId) {
                document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
                document.getElementById(viewId + '-view').classList.remove('hidden');
                if(viewId === 'quiz') renderQuestion();
            }
        };

        function renderQuestion() {
            const q = QUESTIONS[currentIdx];
            document.getElementById('question-text').innerText = q.text;
            document.getElementById('quiz-progress-text').innerText = `Analisi ${currentIdx + 1} / ${QUESTIONS.length}`;
            document.getElementById('quiz-progress-bar').style.width = `${((currentIdx + 1) / QUESTIONS.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full p-6 text-left border border-white/10 glass-morphism group flex justify-between items-center hover:border-dna-purple/50 transition-all";
                btn.innerHTML = `<span class="text-lg text-gray-400 group-hover:text-white">${opt.text}</span><i data-lucide="chevron-right" class="text-dna-purple opacity-0 group-hover:opacity-100 transition-all"></i>`;
                btn.onclick = () => handleAnswer(opt.w);
                container.appendChild(btn);
            });
            lucide.createIcons();
        }

        function handleAnswer(weights) {
            Object.keys(weights).forEach(k => scores[k] += weights[k]);
            if(currentIdx < QUESTIONS.length - 1) {
                currentIdx++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            router.go('loading');
            setTimeout(() => {
                const best = ARCHETYPES.reduce((prev, curr) => {
                    let dPrev = 0, dCurr = 0;
                    Object.keys(scores).forEach(k => {
                        dPrev += Math.pow(scores[k] - prev.traits[k], 2);
                        dCurr += Math.pow(scores[k] - curr.traits[k], 2);
                    });
                    return dCurr < dPrev ? curr : prev;
                });
                renderCard(best);
                router.go('result');
            }, 2500);
        }

        function renderCard(arc) {
            const card = document.getElementById('result-card-container');
            card.innerHTML = `
                <div class="relative w-80 md:w-96 bg-dna-dark border border-white/10 rounded-3xl p-8 overflow-hidden glass-morphism shadow-[0_0_50px_rgba(139,92,246,0.2)]">
                    <div class="absolute -top-24 -right-24 w-64 h-64 blur-[100px] opacity-20" style="background-color: ${arc.color}"></div>
                    <div class="text-center mb-8 relative z-10">
                        <span class="text-[8px] font-esports tracking-[0.4em] text-gray-500 uppercase">Gamer Identity Verified</span>
                        <h2 class="text-4xl font-esports font-black italic uppercase mt-2" style="color: ${arc.color}; text-shadow: 0 0 15px ${arc.color}55">${arc.name}</h2>
                    </div>
                    <div class="flex justify-center my-10 relative z-10">
                        <div class="w-32 h-32 rounded-full border border-white/5 flex items-center justify-center animate-pulse">
                            <span class="text-6xl">🧬</span>
                        </div>
                    </div>
                    <div class="space-y-4 mb-8 relative z-10">
                        ${Object.entries(arc.traits).map(([k, v]) => `
                            <div>
                                <div class="flex justify-between text-[8px] font-esports text-gray-500 uppercase mb-1">
                                    <span>${k}</span><span>${v}%</span>
                                </div>
                                <div class="h-1 bg-white/5 rounded-full overflow-hidden">
                                    <div class="h-full" style="width: ${v}%; background-color: ${arc.color}"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <p class="text-center text-sm italic text-gray-400 px-4 mb-8">"${arc.quote}"</p>
                    <div class="flex justify-between border-t border-white/5 pt-6 relative z-10 text-[10px] font-esports">
                        <div class="text-gray-500 uppercase tracking-widest">Global Rarity: <span class="text-white">${arc.rarity}%</span></div>
                        <div class="text-dna-blue uppercase">PLAYERDNA.GG</div>
                    </div>
                </div>
            `;
        }

        lucide.createIcons();
    </script>
</body>
</html>
